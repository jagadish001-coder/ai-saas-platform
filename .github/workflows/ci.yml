name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install ruff
      - run: ruff check app/ tests/

  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_saas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s

    env:
      SECRET_KEY: test-secret-key-for-ci-only-32chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_saas_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/ai_saas_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt aiosqlite pytest-cov

      - name: Run tests with coverage
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=70

  # ─── Build Docker Image ─────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ai-saas-platform:${{ github.sha }} .

      - name: Verify image starts
        run: |
          docker run --rm -d \
            -e SECRET_KEY=test-key-32-chars-minimum-length \
            -e DATABASE_URL=postgresql+asyncpg://x:x@localhost/x \
            -e DATABASE_URL_SYNC=postgresql://x:x@localhost/x \
            --name test_container ai-saas-platform:${{ github.sha }} \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 || true
